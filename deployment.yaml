apiVersion: apps/v1
kind: Deployment
metadata:
  name: login-app
  labels:
    app: login-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: login-app

  template:
    metadata:
      labels:
        app: login-app

    spec:
      containers:
        - name: login-container
          image: amansumesh/login-demo:latest
          ports:
            - containerPort: 80

          resources:
            requests:
              memory: "64Mi"
              cpu: "250m"
            limits:
              memory: "128Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: login-service

spec:
  type: NodePort

  selector:
    app: login-app

  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30020
